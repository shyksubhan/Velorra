<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account — Velorra</title>
  <link rel="icon" type="image/svg+xml" href="images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/pages.css"/>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <canvas id="account-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.22"></canvas>
  <nav>
    <a href="index.html" class="nav-logo">Vel<span>orra</span></a>
    <div class="nav-icons">
      <button data-open-cart aria-label="Bag">
        &#128717;<span class="cart-count" style="display:none">0</span>
      </button>
    </div>
  </nav>
  <main class="account-main" style="position:relative;z-index:1">
    <div class="account-card-wrap">
      <!-- Tab toggle -->
      <div class="account-tabs">
        <button class="acc-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
        <button class="acc-tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      </div>
      <!-- SIGN IN -->
      <div class="account-panel" id="panel-signin">
        <h1 class="ck-panel-title" style="text-align:center">Welcome <em>Back</em></h1>
        <div class="gold-rule" style="margin:16px auto 28px"></div>
        <form id="signin-form" class="ck-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@email.com" required/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required/>
          </div>
          <div style="text-align:right;margin-top:-8px;margin-bottom:16px">
            <a href="#" style="font-size:.7rem;color:var(--gold)">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary" style="width:100%;text-align:center;padding:16px">Sign In</button>
        </form>
        <p style="text-align:center;margin-top:20px;font-size:.78rem;color:var(--muted)">
          New to Velorra? <a href="#" onclick="switchTab('signup')" style="color:var(--gold)">Create an account</a>
        </p>
      </div>
      <!-- SIGN UP -->
      <div class="account-panel hidden" id="panel-signup">
        <h1 class="ck-panel-title" style="text-align:center">Join <em>Velorra</em></h1>
        <div class="gold-rule" style="margin:16px auto 28px"></div>
        <form id="signup-form" class="ck-form">
          <div class="ck-row-2">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" name="fname" placeholder="First Name" required/>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" name="lname" placeholder="Last Name" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@email.com" required/>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+92 300 000 0000"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Min 8 characters" minlength="8" required/>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm" placeholder="Repeat password" required/>
          </div>
          <label style="display:flex;gap:10px;align-items:flex-start;font-size:.75rem;color:var(--muted);margin-bottom:20px;cursor:pointer">
            <input type="checkbox" required style="margin-top:3px;accent-color:var(--gold)"/>
            I agree to Velorra's <a href="policy.html?page=terms" style="color:var(--gold);margin-left:4px">Terms & Privacy Policy</a>
          </label>
          <button type="submit" class="btn-primary" style="width:100%;text-align:center;padding:16px">Create Account</button>
        </form>
        <p style="text-align:center;margin-top:20px;font-size:.78rem;color:var(--muted)">
          Already have an account? <a href="#" onclick="switchTab('signin')" style="color:var(--gold)">Sign in</a>
        </p>
      </div>
      <!-- LOGGED IN STATE (shown after sign in) -->
      <div class="account-panel hidden" id="panel-loggedin">
        <div style="text-align:center">
          <div style="font-size:3.5rem;margin-bottom:16px">&#128100;</div>
          <h2 class="ck-panel-title" style="text-align:center">Hello, <em id="acc-name-disp">there</em></h2>
          <div class="gold-rule" style="margin:16px auto 28px"></div>
        </div>
        <div class="account-dashboard">
          <a href="shop.html" class="acc-dash-card">
            <span>&#128717;</span>
            <strong>Browse Shop</strong>
            <span>Explore new arrivals</span>
          </a>
          <a href="policy.html?page=track" class="acc-dash-card">
            <span>&#128230;</span>
            <strong>Track Order</strong>
            <span>Check delivery status</span>
          </a>
          <a href="policy.html?page=returns" class="acc-dash-card">
            <span>&#8635;</span>
            <strong>Returns</strong>
            <span>Start a return</span>
          </a>
          <a href="contact.html" class="acc-dash-card">
            <span>&#128172;</span>
            <strong>Support</strong>
            <span>Get help</span>
          </a>
        </div>
        <!-- ORDER HISTORY (shown when logged in) -->
        <div id="order-history-wrap" style="margin-top:24px;display:none">
          <div class="gold-rule" style="margin-bottom:20px"></div>
          <p class="section-label" style="margin-bottom:12px">Your Orders</p>
          <div id="order-history-list"><p style="color:var(--muted);font-size:.8rem">Loading orders…</p></div>
        </div>
        <button onclick="signOut()" class="btn-outline" style="width:100%;margin-top:24px;text-align:center;padding:14px">Sign Out</button>
      </div>
    </div>
  </main>
  <div id="overlay"></div>
  <div id="toast"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/whatsapp-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    /* ── Tab switcher ── */
    function switchTab(tab) {
      document.querySelectorAll('.account-panel').forEach(p => p.classList.add('hidden'));
      document.querySelectorAll('.acc-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + tab)?.classList.remove('hidden');
      document.getElementById('tab-' + tab)?.classList.add('active');
    }

    /* ── Check if already logged in ── */
    const storedUser = getCurrentUser();
    if (storedUser) {
      document.querySelectorAll('.account-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('panel-loggedin')?.classList.remove('hidden');
      document.querySelectorAll('.acc-tab').forEach(t => t.style.display = 'none');
      const nd = document.getElementById('acc-name-disp');
      if (nd) nd.textContent = storedUser.fname || 'there';
      loadOrderHistory(storedUser.email);
    }

    /* ── Load Order History ── */
    async function loadOrderHistory(email) {
      const wrap = document.getElementById('order-history-wrap');
      const list = document.getElementById('order-history-list');
      if (!wrap || !list) return;
      try {
        const data = await apiGetUserOrders(email);
        const orders = data.orders || [];
        wrap.style.display = 'block';
        if (!orders.length) {
          list.innerHTML = '<p style="color:var(--muted);font-size:.8rem">No orders yet. <a href="shop.html" style="color:var(--gold)">Start shopping →</a></p>';
          return;
        }
        list.innerHTML = orders.map(o => `
          <div style="background:rgba(201,168,76,0.05);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <strong style="color:var(--gold);font-size:.82rem">${o.id}</strong>
              <span style="font-size:.7rem;color:var(--muted)">${new Date(o.createdAt).toLocaleDateString('en-PK',{dateStyle:'medium'})}</span>
            </div>
            <div style="font-size:.78rem;color:var(--muted)">${o.items?.length || 0} item(s) — <strong style="color:var(--text)">PKR ${(o.total||0).toLocaleString()}</strong></div>
            <div style="margin-top:6px;font-size:.72rem;">
              <span style="padding:2px 10px;border-radius:10px;font-weight:600;
                background:${o.status==='Delivered'?'rgba(76,175,130,.15)':o.status==='Shipped'?'rgba(201,168,76,.15)':'rgba(76,140,224,.15)'};
                color:${o.status==='Delivered'?'#4caf82':o.status==='Shipped'?'#c9a84c':'#4c8ce0'}">
                ${o.status || 'Pending'}
              </span>
            </div>
          </div>`).join('');
      } catch {
        wrap.style.display = 'none';
      }
    }

    /* ── Sign In (real backend with localStorage fallback) ── */
    document.getElementById('signin-form')?.addEventListener('submit', async e => {
      e.preventDefault();
      const fd       = new FormData(e.target);
      const email    = fd.get('email').trim().toLowerCase();
      const password = fd.get('password');
      const btn      = e.target.querySelector('button[type="submit"]');
      if (btn) { btn.disabled = true; btn.textContent = 'Signing in…'; }

      try {
        const backendAvailable = await checkBackend();
        if (backendAvailable) {
          const result = await apiLogin({ email, password });
          if (result.ok) {
            saveSession(result.data.token, result.data.user);
            clearSigninError();
            showToast('Welcome back to Velorra ✓');
            setTimeout(() => location.reload(), 900);
          } else {
            showSigninError(result.data.error || 'Sign in failed.');
            if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
          }
        } else {
          const stored = JSON.parse(localStorage.getItem('velorra_user') || 'null');
          if (!stored) { showSigninError('No account found. Please create an account first.'); }
          else if (stored.email?.toLowerCase() !== email) { showSigninError('No account found with that email address.'); }
          else if (stored.password !== password) { showSigninError('Incorrect password. Please try again.'); }
          else {
            clearSigninError();
            showToast('Welcome back to Velorra ✓');
            setTimeout(() => location.reload(), 900);
          }
          if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
        }
      } catch {
        showSigninError('Connection error. Please try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
      }
    });

    function showSigninError(msg) {
      let err = document.getElementById('signin-error');
      if (!err) {
        err = document.createElement('p');
        err.id = 'signin-error';
        err.style.cssText = 'color:#e05c5c;font-size:.78rem;margin-bottom:12px;text-align:center;';
        document.getElementById('signin-form').prepend(err);
      }
      err.textContent = msg;
    }
    function clearSigninError() { document.getElementById('signin-error')?.remove(); }

    /* ── Sign Up (real backend with localStorage fallback) ── */
    document.getElementById('signup-form')?.addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      if (fd.get('password') !== fd.get('confirm')) { showToast('Passwords do not match'); return; }
      const btn = e.target.querySelector('button[type="submit"]');
      if (btn) { btn.disabled = true; btn.textContent = 'Creating account…'; }

      const payload = {
        fname: fd.get('fname'), lname: fd.get('lname'),
        email: fd.get('email').trim().toLowerCase(),
        phone: fd.get('phone') || '', password: fd.get('password'),
      };
      try {
        const backendAvailable = await checkBackend();
        if (backendAvailable) {
          const result = await apiRegister(payload);
          if (result.ok) {
            saveSession(result.data.token, result.data.user);
            showToast('Account created! Welcome to Velorra 💛');
            setTimeout(() => location.reload(), 900);
          } else {
            showToast(result.data.error || 'Registration failed.');
            if (btn) { btn.disabled = false; btn.textContent = 'Create Account'; }
          }
        } else {
          localStorage.setItem('velorra_user', JSON.stringify({ ...payload }));
          showToast('Account created! Welcome to Velorra 💛');
          setTimeout(() => location.reload(), 900);
        }
      } catch {
        showToast('Connection error. Please try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Create Account'; }
      }
    });

    /* ── Sign Out ── */
    function signOut() {
      clearSession();
      showToast('Signed out. See you soon!');
      setTimeout(() => location.reload(), 900);
    }

    /* ── 3D Account Animation ── */
    (function() {
      const canvas = document.getElementById('account-canvas');
      if (!canvas || typeof THREE === 'undefined') return;
      const scene  = new THREE.Scene();
      const cam    = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
      cam.position.z = 6;
      const ren = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      ren.setPixelRatio(Math.min(devicePixelRatio, 2));
      ren.setSize(innerWidth, innerHeight);
      const ring1 = new THREE.Mesh(
        new THREE.TorusGeometry(3, 0.025, 12, 90),
        new THREE.MeshBasicMaterial({ color: 0xc9a84c, transparent: true, opacity: 0.35 })
      );
      ring1.rotation.x = 0.9; scene.add(ring1);
      const ring2 = new THREE.Mesh(
        new THREE.TorusGeometry(2, 0.018, 12, 80),
        new THREE.MeshBasicMaterial({ color: 0xe2c97e, transparent: true, opacity: 0.2 })
      );
      ring2.rotation.x = 1.2; ring2.rotation.y = 0.5; scene.add(ring2);
      const n = 140, p = new Float32Array(n*3);
      for (let i=0;i<n;i++){
        const r=3.5+Math.random()*2, t=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
        p[i*3]=r*Math.sin(phi)*Math.cos(t); p[i*3+1]=r*Math.sin(phi)*Math.sin(t); p[i*3+2]=r*Math.cos(phi);
      }
      const pg = new THREE.BufferGeometry(); pg.setAttribute('position', new THREE.BufferAttribute(p,3));
      const pm = new THREE.PointsMaterial({ color:0xc9a84c, size:0.03, transparent:true, opacity:0.5 });
      scene.add(new THREE.Points(pg, pm));
      const clock = new THREE.Clock();
      (function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        ring1.rotation.z = t * 0.14; ring2.rotation.z = -t * 0.1;
        ren.render(scene, cam);
      })();
    })();
  </script>
</body>
</html>
