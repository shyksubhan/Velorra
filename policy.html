<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Policies — Velorra</title>
  <link rel="icon" type="image/svg+xml" href="images/logo.svg" />
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/pages.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <nav>
    <a href="index.html" class="nav-logo">Vel<span>orra</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">Our Story</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-icons">
      <button data-open-cart>&#128717;<span class="cart-count" style="display:none">0</span></button>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <main class="policy-main">
    <div class="container">
      <!-- Sidebar tabs -->
      <div class="policy-layout">
        <aside class="policy-sidebar">
          <h3>Help &amp; Policies</h3>
          <div class="policy-nav">
            <a href="policy.html?page=shipping"  class="policy-link" data-page="shipping">&#128230; Shipping Info</a>
            <a href="policy.html?page=returns"   class="policy-link" data-page="returns">&#8635; Returns Policy</a>
            <a href="policy.html?page=sizeguide" class="policy-link" data-page="sizeguide">&#128221; Size Guide</a>
            <a href="policy.html?page=faqs"      class="policy-link" data-page="faqs">&#10067; FAQs</a>
            <a href="policy.html?page=track"     class="policy-link" data-page="track">&#128205; Track Order</a>
            <a href="policy.html?page=terms"     class="policy-link" data-page="terms">&#128195; Terms &amp; Privacy</a>
          </div>
        </aside>
        <div class="policy-content" id="policy-content">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>
  </main>
  <div id="toast"></div>
  <script src="js/whatsapp-config.js"></script>
  <script src="js/main.js"></script>
  <script>
  const POLICIES = {
    shipping: {
      title: 'Shipping Information',
      icon: '📦',
      html: `
        <h2>Shipping <em>Information</em></h2>
        <div class="gold-rule"></div>
        <div class="policy-section">
          <h3>Delivery Options</h3>
          <table class="policy-table">
            <thead><tr><th>Method</th><th>Timeframe</th><th>Cost</th></tr></thead>
            <tbody>
              <tr><td>Standard Delivery</td><td>3–5 business days</td><td>FREE on orders over PKR 5,000 · PKR 200 otherwise</td></tr>
              <tr><td>Express Delivery</td><td>1–2 business days</td><td>PKR 250 (Lahore only)</td></tr>
            </tbody>
          </table>
        </div>
        <div class="policy-section">
          <h3>Order Processing</h3>
          <p>All orders are processed within 24 hours on business days (Monday–Saturday, 10am–7pm PKT). Orders placed after 5pm or on Sundays will be processed the next business day.</p>
        </div>
        <div class="policy-section">
          <h3>Tracking Your Order</h3>
          <p>Once your order has been dispatched, you will receive a confirmation SMS and email with your tracking number. You can use this to monitor your delivery status via the courier's website or our <a href="policy.html?page=track" style="color:var(--gold)">Track Order</a> page.</p>
        </div>
        <div class="policy-section">
          <h3>Delivery Areas</h3>
          <p>We deliver across all of Pakistan. Remote areas may require an additional 1–2 days. Cash on Delivery (COD) is available nationwide.</p>
        </div>
        <div class="policy-section">
          <h3>Important Notes</h3>
          <ul class="policy-list">
            <li>Delivery times are estimates and may vary during sale periods or public holidays.</li>
            <li>Velorra is not responsible for delays caused by the courier service.</li>
            <li>Please ensure your delivery address and phone number are correct at checkout.</li>
          </ul>
        </div>`
    },
    returns: {
      title: 'Returns Policy',
      icon: '🔄',
      html: `
        <h2>Returns <em>Policy</em></h2>
        <div class="gold-rule"></div>
        <div class="policy-section">
          <h3>14-Day Return Window</h3>
          <p>We offer a <strong>14-day hassle-free return policy</strong> from the date of delivery. If you're not completely satisfied with your purchase, we'll make it right.</p>
        </div>
        <div class="policy-section">
          <h3>Conditions for Return</h3>
          <ul class="policy-list">
            <li>Item must be unused, unworn, and unwashed</li>
            <li>Original tags and packaging must be intact</li>
            <li>Item must not be damaged, stained, or altered</li>
            <li>Sale items and cosmetics are <strong>non-returnable</strong> for hygiene reasons</li>
          </ul>
        </div>
        <div class="policy-section">
          <h3>How to Return</h3>
          <ol class="policy-list">
            <li>Contact us via WhatsApp or email within 14 days of receiving your order</li>
            <li>Share your order number and reason for return</li>
            <li>We will arrange a pickup or provide a drop-off address</li>
            <li>Once the item is received and inspected, your refund will be processed within 5–7 business days</li>
          </ol>
        </div>
        <div class="policy-section">
          <h3>Exchanges</h3>
          <p>We happily exchange items for a different size or colour, subject to availability. Please mention your preferred exchange at the time of return request.</p>
        </div>
        <div class="policy-section">
          <h3>Refund Methods</h3>
          <p>Refunds are issued via bank transfer, Easypaisa, or JazzCash. COD orders are refunded to your provided bank account or wallet.</p>
        </div>`
    },
    sizeguide: {
      title: 'Size Guide',
      icon: '📐',
      html: `
        <h2>Size <em>Guide</em></h2>
        <div class="gold-rule"></div>
        <p style="color:var(--muted);margin-bottom:28px">All measurements are in <strong style="color:var(--white)">centimetres (cm)</strong>. When between sizes, we recommend sizing up for comfort.</p>
        <div class="policy-section">
          <h3>Women's Clothing</h3>
          <table class="policy-table">
            <thead><tr><th>Size</th><th>Chest</th><th>Waist</th><th>Hips</th><th>UK/EU Equiv.</th></tr></thead>
            <tbody>
              <tr><td>XS</td><td>80–83</td><td>62–65</td><td>88–91</td><td>6 / 34</td></tr>
              <tr><td>S</td><td>84–87</td><td>66–69</td><td>92–95</td><td>8 / 36</td></tr>
              <tr><td>M</td><td>88–93</td><td>70–75</td><td>96–101</td><td>10–12 / 38–40</td></tr>
              <tr><td>L</td><td>94–99</td><td>76–81</td><td>102–107</td><td>14 / 42</td></tr>
              <tr><td>XL</td><td>100–107</td><td>82–89</td><td>108–115</td><td>16 / 44</td></tr>
              <tr><td>XXL</td><td>108–115</td><td>90–97</td><td>116–123</td><td>18 / 46</td></tr>
            </tbody>
          </table>
        </div>
        <div class="policy-section">
          <h3>Men's Clothing</h3>
          <table class="policy-table">
            <thead><tr><th>Size</th><th>Chest</th><th>Waist</th><th>Shoulder</th></tr></thead>
            <tbody>
              <tr><td>S</td><td>88–93</td><td>74–79</td><td>43–44</td></tr>
              <tr><td>M</td><td>94–99</td><td>80–85</td><td>45–46</td></tr>
              <tr><td>L</td><td>100–107</td><td>86–91</td><td>47–48</td></tr>
              <tr><td>XL</td><td>108–115</td><td>92–99</td><td>49–50</td></tr>
              <tr><td>XXL</td><td>116–123</td><td>100–107</td><td>51–52</td></tr>
            </tbody>
          </table>
        </div>
        <div class="policy-section">
          <h3>How to Measure</h3>
          <ul class="policy-list">
            <li><strong>Chest:</strong> Measure around the fullest part of your chest, keeping the tape horizontal.</li>
            <li><strong>Waist:</strong> Measure around your natural waistline, at the narrowest point.</li>
            <li><strong>Hips:</strong> Measure around the fullest part of your hips and seat.</li>
          </ul>
        </div>`
    },
    faqs: {
      title: 'Frequently Asked Questions',
      icon: '❓',
      html: `
        <h2>Frequently Asked <em>Questions</em></h2>
        <div class="gold-rule"></div>
        <div class="faq-list">
          ${[
            ['How do I place an order?', 'Browse our shop, select your items, add them to your bag, and proceed to checkout. You can pay via Cash on Delivery, Easypaisa, JazzCash, or card.'],
            ['How long does delivery take?', 'Standard delivery takes 3–5 business days. Express delivery (Lahore only) takes 1–2 business days.'],
            ['Is Cash on Delivery available?', 'Yes! COD is available across all of Pakistan. Simply select Cash on Delivery at checkout.'],
            ['Can I return a product?', 'Yes, we accept returns within 14 days of delivery. Items must be unused with original tags. Cosmetics and sale items are non-returnable.'],
            ['How do I track my order?', 'Once dispatched, you\'ll receive an SMS and email with your tracking number. Visit our Track Order page for real-time updates.'],
            ['Do you offer gift packaging?', 'Yes! All Velorra orders come in premium branded packaging. For gift orders, add a note at checkout.'],
            ['Can I exchange for a different size?', 'Absolutely. Contact us within 14 days and we\'ll arrange an exchange subject to stock availability.'],
            ['Is there a warranty on jewellery and watches?', 'All jewellery and watches come with a 6-month quality guarantee against manufacturing defects.'],
            ['How do I subscribe to the newsletter?', 'Enter your email in the newsletter section on our homepage to get updates on new arrivals and collections.'],
            ['What if my item arrives damaged?', 'We\'re so sorry to hear that. Contact us within 48 hours of delivery with photos, and we\'ll resolve it immediately.'],
          ].map(([q,a]) => `
            <div class="faq-item">
              <button class="faq-question" onclick="this.parentElement.classList.toggle('open')">
                ${q}<span class="faq-chevron">▾</span>
              </button>
              <div class="faq-answer"><p>${a}</p></div>
            </div>`).join('')}
        </div>`
    },
    track: {
      title: 'Track Your Order',
      icon: '📍',
      html: `
        <h2>Track Your <em>Order</em></h2>
        <div class="gold-rule"></div>
        <div class="policy-section">
          <p>Enter your order reference number or the email address used at checkout to track your delivery status.</p>
          <div class="track-form">
            <div class="form-group">
              <label>Order Reference Number</label>
              <input type="text" id="track-ref" placeholder="e.g. VLR-12345678"/>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="track-email" placeholder="you@email.com"/>
            </div>
            <button class="btn-primary" onclick="trackOrder()" style="margin-top:8px">Track Order</button>
          </div>
          <div id="track-result" style="display:none;margin-top:28px"></div>
        </div>
        <div class="policy-section">
          <h3>Need Help?</h3>
          <p>If you can't find your order, contact us directly:</p>
          <ul class="policy-list">
            <li>WhatsApp: <a href="#" id="wa-track-link" style="color:var(--gold)"><span data-velorra="phone">+92 300 000 0000</span></a></li>
            <li>Email: <a href="#" style="color:var(--gold)" data-velorra="email">hello@velorra.com</a></li>
          </ul>
        </div>`
    },
    terms: {
      title: 'Terms & Privacy Policy',
      icon: '📋',
      html: `
        <h2>Terms &amp; <em>Privacy Policy</em></h2>
        <div class="gold-rule"></div>
        <div class="policy-section">
          <h3>Terms of Use</h3>
          <p>By using the Velorra website and placing orders, you agree to the following terms. Velorra reserves the right to update these terms at any time.</p>
          <ul class="policy-list">
            <li>Products are subject to availability. We reserve the right to cancel orders if stock is unavailable.</li>
            <li>Prices are listed in Pakistani Rupees (PKR) and are inclusive of all applicable taxes.</li>
            <li>Velorra reserves the right to refuse service to any customer at our discretion.</li>
            <li>Product images are for illustrative purposes; slight colour variations may occur.</li>
          </ul>
        </div>
        <div class="policy-section">
          <h3>Privacy Policy</h3>
          <p>Your privacy is important to us. We collect only the information necessary to process your orders and improve your experience.</p>
          <ul class="policy-list">
            <li><strong>Data collected:</strong> Name, email, phone, delivery address, and order history.</li>
            <li><strong>Usage:</strong> Your data is used solely for order processing, delivery, and customer support.</li>
            <li><strong>Sharing:</strong> We never sell or share your personal data with third parties, except delivery couriers.</li>
            <li><strong>Cookies:</strong> We use cookies to improve site performance. You may disable cookies in your browser settings.</li>
          </ul>
        </div>
        <div class="policy-section">
          <h3>Contact for Concerns</h3>
          <p>For any privacy or terms concerns, email us at <a href="#" style="color:var(--gold)" data-velorra="email">hello@velorra.com</a>.</p>
        </div>`
    }
  };
  /* ── Load correct page from URL ── */
  const params = new URLSearchParams(window.location.search);
  const page   = params.get('page') || 'shipping';
  function loadPolicy(key) {
    const data    = POLICIES[key] || POLICIES['shipping'];
    const content = document.getElementById('policy-content');
    if (content) content.innerHTML = data.html;
    if (content && window.applyVelorraContactInfo) window.applyVelorraContactInfo(content);
    document.title = data.title + ' — Velorra';
    /* Update sidebar heading to reflect active page */
    const sidebarHeading = document.querySelector('.policy-sidebar h3');
    if (sidebarHeading) sidebarHeading.textContent = 'Help & Policies';
    /* Highlight active link */
    document.querySelectorAll('.policy-link').forEach(l => {
      l.classList.toggle('active', l.dataset.page === key);
    });
    /* Set WA link on track page */
    const waLink = document.getElementById('wa-track-link');
    if (waLink && window.VELORRA_CONFIG) waLink.href = window.VELORRA_CONFIG.social.whatsapp;
  }
  loadPolicy(page);
  /* Policy sidebar navigation */
  document.querySelectorAll('.policy-link').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      const pg = link.dataset.page;
      history.pushState({}, '', '?page=' + pg);
      loadPolicy(pg);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
  /* Track order — real backend */
  window.trackOrder = async () => {
    const ref    = document.getElementById('track-ref')?.value.trim();
    const email  = document.getElementById('track-email')?.value.trim();
    const result = document.getElementById('track-result');
    const btn    = document.querySelector('[onclick="trackOrder()"]');
    if (!ref && !email) { showToast('Please enter your order number or email'); return; }
    if (!result) return;
    if (btn) { btn.disabled = true; btn.textContent = 'Tracking…'; }
    result.style.display = 'block';
    result.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);">Looking up your order…</div>`;
    try {
      let order = null;
      if (ref) {
        const res  = await fetch(`https://velorra-vvp3.onrender.com/api/orders/track/${encodeURIComponent(ref)}`);
        const data = await res.json();
        if (res.ok) order = data.order;
      }
      if (!order && email) {
        const res  = await fetch(`https://velorra-vvp3.onrender.com/api/orders/user/${encodeURIComponent(email)}`);
        const data = await res.json();
        if (res.ok && data.orders?.length) order = data.orders[0];
      }
      if (!order) {
        result.innerHTML = `<div class="track-status-card" style="border-left:3px solid #d96a6a;padding:20px;">
          <div class="track-status-icon">❌</div>
          <div><strong>Order Not Found</strong>
          <p style="color:var(--muted);font-size:.85rem;margin-top:6px;">No order found with that reference or email. Double-check and try again, or contact us on WhatsApp.</p>
          <a href="${window.VELORRA_CONFIG?.social?.whatsapp || '#'}" target="_blank" class="btn-primary" style="display:inline-block;margin-top:14px;padding:12px 28px;">Chat on WhatsApp ↗</a></div></div>`;
        return;
      }
      const statusColors = { Pending:'#c9a84c', Processing:'#5b9bd5', Shipped:'#7ec8a4', Delivered:'#5cb85c', Cancelled:'#d96a6a' };
      const statusIcons  = { Pending:'⏳', Processing:'⚙️', Shipped:'🚚', Delivered:'✅', Cancelled:'❌' };
      const steps = ['Pending','Processing','Shipped','Delivered'];
      const stepIdx = steps.indexOf(order.status);
      const stepsHTML = order.status === 'Cancelled' ? '' : `
        <div style="display:flex;gap:0;margin:20px 0 8px;align-items:center;">
          ${steps.map((s,i) => `
            <div style="flex:1;text-align:center;">
              <div style="width:32px;height:32px;border-radius:50%;background:${i<=stepIdx?'var(--gold)':'var(--card)'};border:2px solid ${i<=stepIdx?'var(--gold)':'var(--border)'};display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:.9rem;">${i<=stepIdx?'✓':i+1}</div>
              <p style="font-size:.68rem;color:${i<=stepIdx?'var(--gold)':'var(--muted)'};margin-top:5px;">${s}</p>
            </div>
            ${i<steps.length-1?`<div style="flex:0.5;height:2px;background:${i<stepIdx?'var(--gold)':'var(--border)'};margin-bottom:22px;"></div>`:''}
          `).join('')}
        </div>`;
      result.innerHTML = `
        <div class="track-status-card" style="border:1px solid var(--border);border-left:4px solid ${statusColors[order.status]||'var(--gold)'};padding:24px;border-radius:8px;background:var(--card);">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
            <div>
              <p style="color:var(--muted);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;">Order Reference</p>
              <strong style="font-size:1.1rem;">${order.id}</strong>
            </div>
            <div style="background:${statusColors[order.status]||'var(--gold)'}22;border:1px solid ${statusColors[order.status]||'var(--gold)'};padding:6px 16px;border-radius:20px;font-size:.82rem;font-weight:600;color:${statusColors[order.status]||'var(--gold)'};">
              ${statusIcons[order.status]||'📦'} ${order.status}
            </div>
          </div>
          ${stepsHTML}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;font-size:.82rem;">
            <div><span style="color:var(--muted);">Order Placed</span><br><strong>${new Date(order.createdAt).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'})}</strong></div>
            <div><span style="color:var(--muted);">Last Updated</span><br><strong>${new Date(order.updatedAt||order.createdAt).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'})}</strong></div>
            ${order.total ? `<div><span style="color:var(--muted);">Order Total</span><br><strong>PKR ${Number(order.total).toLocaleString()}</strong></div>`:''}
            ${order.deliveryMethod ? `<div><span style="color:var(--muted);">Delivery</span><br><strong style="text-transform:capitalize;">${order.deliveryMethod}</strong></div>`:''}
          </div>
          ${order.items?.length ? `<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
            <p style="color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Items</p>
            ${order.items.map(i=>`<div style="display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;"><span>${i.emoji||'🛍️'} ${i.name} ×${i.qty}</span><span>PKR ${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}
          </div>`:''}
        </div>`;
    } catch (err) {
      result.innerHTML = `<div style="padding:20px;color:#d96a6a;">Could not reach the server. Please try again.</div>`;
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Track Order'; }
    }
  };
  </script>
</body>
</html>
