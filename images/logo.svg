<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <!-- V diamond motif -->
  <polyline points="8,8 22,40 36,8" fill="none" stroke="#b8883a" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="8"  cy="8"  r="2.2" fill="#b8883a"/>
  <circle cx="36" cy="8"  r="2.2" fill="#b8883a"/>
  <circle cx="22" cy="40" r="2.2" fill="#b8883a"/>
  <!-- thin vertical accent -->
  <line x1="44" y1="8" x2="44" y2="48" stroke="#b8883a" stroke-width="0.6" opacity="0.4"/>
  <!-- Brand name -->
  <text x="54" y="36" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" letter-spacing="3" fill="#2c1f14">VELORRA</text>
  <!-- Tagline -->
  <text x="55" y="50" font-family="'Lato', Arial, sans-serif" font-size="9" font-weight="400" letter-spacing="6" fill="#b8883a"></text>
  <!-- rule -->
  <line x1="54" y1="40" x2="228" y2="40" stroke="#b8883a" stroke-width="0.6" opacity="0.5"/>
</svg>
