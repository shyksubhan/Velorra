<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e2c97e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2c97e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a5f2a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Diamond / gem mark -->
  <g transform="translate(32,70)">
    <!-- outer diamond -->
    <polygon points="0,-28 16,-8 0,20 -16,-8"
             fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- inner facets -->
    <line x1="0" y1="-28" x2="0" y2="20" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.5"/>
    <line x1="-16" y1="-8" x2="16" y2="-8" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.5"/>
    <line x1="-16" y1="-8" x2="0" y2="20" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.35"/>
    <line x1="16" y1="-8" x2="0" y2="20" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.35"/>
    <!-- centre dot -->
    <circle cx="0" cy="-4" r="2.5" fill="url(#goldGrad2)"/>
  </g>

  <!-- Wordmark -->
  <text
    x="68" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="400"
    letter-spacing="10"
    fill="url(#goldGrad)"
  >VELORRA</text>

  <!-- Tagline -->
  <text
    x="69" y="112"
    font-family="'Arial Narrow', Arial, sans-serif"
    font-size="10"
    font-weight="300"
    letter-spacing="6"
    fill="#c9a84c"
    opacity="0.75"
  >LUXURY FASHION</text>

  <!-- Underline accent -->
  <line x1="68" y1="118" x2="232" y2="118" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>
</svg>
